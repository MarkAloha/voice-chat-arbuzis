<section class="card">
  <div class="brand">
    <span class="brand-icon" aria-hidden="true">🍉</span>
    <h1>Arbuzis</h1>
  </div>
  <p class="subtitle">Голосовой чат. Введите своё имя и общий пароль, чтобы войти в комнату.</p>

  <form (ngSubmit)="submit()">
    <label>
      <span class="label-row">
        Ваше имя
        <button
          type="button"
          class="random-name"
          (click)="pickRandomName()"
          title="Случайное имя"
          aria-label="Подставить случайное имя"
        >
          ?
        </button>
      </span>
      <input
        type="text"
        name="nickname"
        [(ngModel)]="nickname"
        autocomplete="nickname"
        maxlength="32"
        required
      />
    </label>

    <label>
      Пароль
      <input
        type="password"
        name="password"
        [(ngModel)]="password"
        autocomplete="current-password"
        required
      />
    </label>

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }

    <button type="submit" class="submit" [disabled]="loading()">
      {{ loading() ? 'Вход…' : 'Войти в комнату' }}
    </button>
  </form>
</section>
