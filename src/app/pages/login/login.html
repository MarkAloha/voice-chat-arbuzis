<section class="card">
  <div class="brand">
    <span class="brand-icon" aria-hidden="true">🍉</span>
    <h1>Arbuzis</h1>
  </div>
  <p class="subtitle">Голосовой чат. Введите своё имя и общий пароль, чтобы войти в комнату.</p>

  <form (ngSubmit)="submit()">
    <label class="name-field">
      <div class="name-label-row">
        <span>Ваше имя</span>
        <button
          type="button"
          class="icon-btn icon-btn--ghost icon-btn--plain"
          (click)="pickRandomName()"
          title="Случайное имя"
          aria-label="Подставить случайное имя"
        >
          ?
        </button>
      </div>

      <div class="name-input-row">
        <button
          type="button"
          class="icon-btn icon-btn--ghost icon-btn--plain icon-btn--back"
          (click)="goBack()"
          title="Назад"
          aria-label="Назад"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M15.41 7.41 14 6l-6 6 6 6 1.41-1.41L10.83 12z"
            />
          </svg>
        </button>

        <input
          type="text"
          name="nickname"
          [(ngModel)]="nickname"
          autocomplete="nickname"
          maxlength="32"
          required
        />
      </div>
    </label>

    <label>
      Пароль
      <input
        type="password"
        name="password"
        [(ngModel)]="password"
        autocomplete="current-password"
        required
      />
    </label>

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }

    <button type="submit" class="submit" [disabled]="loading()">
      {{ loading() ? 'Вход…' : 'Войти в комнату' }}
    </button>
  </form>
</section>
