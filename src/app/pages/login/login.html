<section class="card">
  <div class="brand">
    <span class="brand-icon" aria-hidden="true">🍉</span>
    <h1>Arbuzis</h1>
  </div>
  <p class="subtitle">Голосовой чат. Введите общий пароль и своё имя, чтобы войти в комнату.</p>

  <form (ngSubmit)="submit()">
    <label>
      Пароль
      <input
        type="password"
        name="password"
        [(ngModel)]="password"
        autocomplete="current-password"
        required
      />
    </label>

    <label>
      Ваше имя
      <input
        type="text"
        name="nickname"
        [(ngModel)]="nickname"
        autocomplete="nickname"
        maxlength="32"
        required
      />
    </label>

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }

    <button type="submit" [disabled]="loading()">
      {{ loading() ? 'Вход…' : 'Войти в комнату' }}
    </button>
  </form>
</section>
